[phases.setup]
aptPkgs = ["python3", "make", "g++"]

[phases.build]
cmds = ["npm ci", "npm run build"]

[start]
# Run Next directly (not via `npm start`) so SIGTERM on redeploy is handled
# gracefully and exits 0 — otherwise npm reports "signal SIGTERM" as a non-zero
# exit and Railway flags every rolling redeploy as a crash.
cmd = "node_modules/.bin/next start"
